<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="20" ry="20" fill="#AA278F"/>

  <!-- Microphone capsule -->
  <rect x="82" y="30" width="36" height="72" rx="18" ry="18" fill="white"/>

  <!-- Microphone stand arc -->
  <path d="M58 102 Q58 140 100 140 Q142 140 142 102"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Stand stem -->
  <line x1="100" y1="140" x2="100" y2="160" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="72" y1="160" x2="128" y2="160" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Analog waveform (sine wave across the mic capsule) -->
  <path d="M82 66 Q88 56 94 66 Q100 76 106 66 Q112 56 118 66"
        fill="none" stroke="#AA278F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
